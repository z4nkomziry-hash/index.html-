<!DOCTYPE html>
<html lang="ku-center" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAVETA | دابەزێنەرێ ئینستاگرامێ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="text-white min-h-screen flex flex-col items-center justify-center p-4">

    <header class="mb-8 text-center">
        <h1 class="text-3xl font-extrabold">SAVE<span class="text-pink-500">TA</span></h1>
    </header>

    <main class="glass-card w-full max-w-lg p-6 rounded-3xl shadow-2xl">
        <h2 class="text-lg font-bold mb-4 text-center">لینکی ئینستاگرامێ لڤێرە دانێ</h2>
        
        <input type="text" id="instaUrl" placeholder="https://www.instagram.com/..." 
            class="w-full bg-slate-950 border border-slate-700 p-4 rounded-xl mb-4 text-left outline-none focus:border-pink-500 transition" dir="ltr">
        
        <button onclick="downloadMedia()" id="btnDownload" 
            class="w-full bg-gradient-to-r from-pink-500 to-violet-600 p-4 rounded-xl font-bold hover:opacity-90 transition">
            دابەزینە
        </button>

        <div id="errorMessage" class="hidden mt-4 text-red-400 bg-red-900/20 p-3 rounded-lg text-sm text-center border border-red-900/30"></div>
        
        <div id="resultCard" class="hidden mt-6 text-center">
            <img id="mediaCover" class="w-full rounded-2xl mb-4 shadow-lg">
            <button id="downloadBtnMain" class="w-full bg-emerald-600 p-4 rounded-xl font-bold hover:bg-emerald-700 transition">
                دابەزاندنا فایلی
            </button>
        </div>
    </main>

    <footer class="mt-12 text-slate-500 text-sm">SAVETA © 2026</footer>

    <script>
        async function downloadMedia() {
            const url = document.getElementById('instaUrl').value.trim();
            const btn = document.getElementById('btnDownload');
            const err = document.getElementById('errorMessage');
            const resCard = document.getElementById('resultCard');
            
            if(!url) return;
            btn.innerText = "لێگەریان...";
            err.classList.add('hidden');
            resCard.classList.add('hidden');

            try {
                // سێرڤەرەکێ جێگیر
                const res = await fetch(`https://api.vkrhost.com/api/instagram.php?url=${encodeURIComponent(url)}`);
                const data = await res.json();
                
                if(data.data && data.data[0]) {
                    document.getElementById('mediaCover').src = data.data[0].thumbnail;
                    resCard.classList.remove('hidden');
                    document.getElementById('downloadBtnMain').onclick = () => window.open(data.data[0].url, '_blank');
                } else {
                    throw new Error();
                }
            } catch {
                err.innerText = "کێشەیەک د لینکێ دا هەیە یان ئەکاونت یێ تایبەتە!";
                err.classList.remove('hidden');
            } finally {
                btn.innerText = "دابەزینە";
            }
        }
    </script>
</body>
</html>
