<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAVETA | دابەزێنەرێ ئینستاگرامێ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%); color: white; min-height: 100vh; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .glass-box { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-4">

    <div class="mb-8 text-center">
        <h1 class="text-4xl font-black tracking-tighter">SAVE<span class="text-pink-500">TA</span></h1>
    </div>

    <main class="glass-box w-full max-w-md p-6 rounded-3xl shadow-2xl">
        <p class="text-center text-slate-300 mb-6 font-medium">لینکی ئینستاگرامێ لڤێرە دانێ</p>
        
        <input type="text" id="instaUrl" placeholder="https://www.instagram.com/..." 
            class="w-full bg-slate-950 border border-slate-700 p-4 rounded-2xl mb-4 text-left outline-none focus:border-pink-500 transition" dir="ltr">
        
        <button onclick="downloadMedia()" id="btnDownload" 
            class="w-full bg-gradient-to-r from-pink-500 to-violet-600 p-4 rounded-2xl font-bold text-white hover:opacity-90 transition shadow-lg">
            دابەزینە
        </button>

        <div id="errorMessage" class="hidden mt-4 text-red-400 bg-red-950/30 p-3 rounded-xl text-sm text-center border border-red-900/50"></div>
    </main>

    <button onclick="document.getElementById('supportModal').classList.remove('hidden')" class="mt-8 text-slate-400 hover:text-white transition flex items-center gap-2">
        <i class="fa-solid fa-heart text-pink-500"></i> پشتەڤانیا مە بکە ☕
    </button>

    <div id="supportModal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <div class="bg-slate-900 p-6 rounded-3xl w-full max-w-xs text-center border border-slate-700">
            <h3 class="font-bold text-lg mb-4">پشتەڤانییا مە بکە</h3>
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=FastPay:+9647506045491" class="mx-auto bg-white p-2 rounded-2xl mb-4">
            <p class="font-mono text-pink-500 font-bold mb-4">+964 750 604 5491</p>
            <button onclick="document.getElementById('supportModal').classList.add('hidden')" class="w-full bg-slate-800 py-3 rounded-xl hover:bg-slate-700">داخستن</button>
        </div>
    </div>

    <footer class="mt-12 text-slate-600 text-sm">SAVETA © 2026</footer>

    <script>
        async function downloadMedia() {
            const url = document.getElementById('instaUrl').value.trim();
            const btn = document.getElementById('btnDownload');
            const err = document.getElementById('errorMessage');
            
            if(!url) return;
            btn.innerText = "لێگەریان...";
            err.classList.add('hidden');

            try {
                const res = await fetch(`https://api.vkrhost.com/api/instagram.php?url=${encodeURIComponent(url)}`);
                const data = await res.json();
                
                if(data.data && data.data[0]) {
                    window.open(data.data[0].url, '_blank');
                } else {
                    throw new Error();
                }
            } catch {
                err.innerText = "کێشەیەک د لینکێ دا هەیە یان ئەکاونت یێ تایبەتە!";
                err.classList.remove('hidden');
            } finally {
                btn.innerText = "دابەزینە";
            }
        }
    </script>
</body>
</html>
