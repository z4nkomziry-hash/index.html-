<script>
    async function downloadMedia() {
        const urlInput = document.getElementById('instaUrl').value.trim();
        const btnDownload = document.getElementById('btnDownload');
        const errorMessage = document.getElementById('errorMessage');
        
        if (!urlInput) return showError("هیڤییە لینکەکێ دروست دانی");

        btnDownload.disabled = true;
        btnDownload.innerText = "جاري البحث...";

        try {
            // سێرڤەرەکێ جێگیرتر بۆ ئینستاگرامێ
            let response = await fetch(`https://api.snapinsta.app/video?url=${encodeURIComponent(urlInput)}`);
            // تێبینی: ئەگەر ئەڤ سێرڤەرە نەکر، دێ بەرسڤەکێ دەی تا من سێرڤەرەکێ دی بۆ تە پەیدا کر.
            // ... (تەڤایا کۆدێ تە ل سەر ڤی شێوازی بپارێزە)
        } catch (e) {
            showError("نەهاتە دیتن: پەیوەندی ب سێرڤەری نەهاتە کرن.");
        } finally {
            btnDownload.disabled = false;
        }
    }
</script>
