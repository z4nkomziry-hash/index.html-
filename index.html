<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAVETA | داگرتنا ئینستاگرامێ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;800&display=swap');
        body { font-family: 'Outfit', sans-serif; background: #050505; color: white; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .grad-text { background: linear-gradient(45deg, #f09433, #bc1888); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="p-4 flex flex-col items-center">

    <header class="w-full max-w-lg flex justify-between items-center mb-8">
        <h1 class="text-3xl font-black flex items-center gap-2">
            <i class="fa-brands fa-instagram text-pink-500"></i> SAVETA
        </h1>
        <select class="bg-white/5 border border-white/10 rounded-xl p-2 text-sm outline-none">
            <option>☀️ کوردی (بەهدینی)</option>
        </select>
    </header>

    <div class="w-full max-w-lg min-h-[100px] bg-white/5 rounded-3xl mb-6 border border-dashed border-white/20"></div>

    <main class="glass w-full max-w-lg p-8 rounded-[40px] text-center shadow-2xl">
        <h2 class="text-xl font-bold mb-6">دابەزاندنا ڕیلز و ستۆریێن ئینستگرامی بێ لۆگۆ</h2>
        
        <div class="relative mb-4 flex items-center bg-black/40 rounded-2xl border border-white/10 overflow-hidden">
            <input type="text" id="instaUrl" placeholder="لینکێ ڕیلز یان ستوری بدانە ژبوو دابەزاندنێ" class="w-full p-5 bg-transparent outline-none text-sm text-right pr-4">
            <button onclick="pasteLink()" class="bg-white/10 px-4 py-2 m-2 rounded-xl text-sm hover:bg-white/20">Paste</button>
        </div>
        <button class="w-full bg-gradient-to-r from-pink-500 to-violet-600 p-5 rounded-2xl font-bold mb-6">دابەزینە</button>

        <a href="https://tikjet.netlify.app/" class="block p-4 border border-pink-500/30 rounded-2xl bg-pink-500/5 hover:bg-pink-500/10 transition text-sm">
            ژبۆ دابەزاندنا ڤیدیو و ستوریێت تیک توکی ڤێرێ کلیک بکە
        </a>
    </main>

    <section class="mt-6 w-full max-w-lg">
        <button onclick="toggleSupport()" class="w-full glass p-5 rounded-2xl font-bold flex justify-between items-center">
            رێکێن دی یێن پشتەڤانیێ <i class="fa fa-chevron-down text-xs"></i>
        </button>
        <div id="supportContent" class="hidden mt-2 space-y-2">
            <div class="glass p-3 rounded-2xl flex justify-between items-center text-xs">
                <span class="text-amber-400 font-bold flex items-center gap-2">
                    <i class="fa-solid fa-wallet"></i> FastPay: +964 750 604 5491
                </span>
                <button onclick="copyText('+9647506045491')" class="bg-white/10 px-2 py-1 rounded">Copy</button>
            </div>
            <div class="glass p-3 rounded-2xl flex justify-between items-center text-xs">
                <span class="text-emerald-400 font-bold flex items-center gap-2 truncate max-w-[150px]">
                    <i class="fa-solid fa-coins"></i> USDT: TKUfV...
                </span>
                <button onclick="copyText('TKUfVwnjyT2KUa9xnBreT32YLLJEwACHpc')" class="bg-white/10 px-2 py-1 rounded">Copy</button>
            </div>
        </div>
    </section>

    <div class="w-full max-w-lg min-h-[100px] bg-white/5 rounded-3xl mt-6 border border-dashed border-white/20"></div>

    <script>
        function toggleSupport() { document.getElementById('supportContent').classList.toggle('hidden'); }
        async function pasteLink() { const t = await navigator.clipboard.readText(); document.getElementById('instaUrl').value = t; }
        function copyText(t) { navigator.clipboard.writeText(t); alert("هاتە کۆپیکرن!"); }
    </script>
</body>
</html>
