<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAVETA | دابەزێنەرێ ئینستاگرامێ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { 
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%); 
            color: white; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
        }
        .main-card { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            width: 90%; 
            max-width: 450px; 
            padding: 24px; 
            border-radius: 24px;
        }
    </style>
</head>
<body>

    <div class="mb-8 text-center">
        <h1 class="text-4xl font-black">SAVE<span class="text-pink-500">TA</span></h1>
    </div>

    <div class="main-card shadow-2xl">
        <p class="text-center text-slate-300 mb-4 font-bold">لینکی ئینستاگرامێ لڤێرە دانێ</p>
        
        <input type="text" id="instaUrl" placeholder="https://www.instagram.com/..." 
            class="w-full bg-slate-950 border border-slate-700 p-4 rounded-xl mb-4 text-left outline-none focus:border-pink-500 transition" dir="ltr">
        
        <button onclick="downloadMedia()" id="btnDownload" 
            class="w-full bg-gradient-to-r from-pink-500 to-violet-600 p-4 rounded-xl font-bold text-white hover:opacity-90 transition">
            دابەزینە
        </button>

        <div id="errorMessage" class="hidden mt-4 text-red-400 bg-red-900/20 p-3 rounded-lg text-sm text-center"></div>
    </div>

    <div class="mt-8 text-center">
        <button onclick="alert('FastPay: +964 750 604 5491')" class="text-slate-400 hover:text-white transition flex items-center gap-2">
            <i class="fa-solid fa-heart text-pink-500"></i> پشتەڤانیا مە بکە ☕
        </button>
    </div>

    <footer class="mt-12 text-slate-600 text-sm">SAVETA © 2026</footer>

    <script>
        async function downloadMedia() {
            const url = document.getElementById('instaUrl').value.trim();
            const btn = document.getElementById('btnDownload');
            const err = document.getElementById('errorMessage');
            
            if(!url) return;
            btn.innerText = "لێگەریان...";
            err.classList.add('hidden');

            try {
                const res = await fetch(`https://api.vkrhost.com/api/instagram.php?url=${encodeURIComponent(url)}`);
                const data = await res.json();
                
                if(data.data && data.data[0]) {
                    window.open(data.data[0].url, '_blank');
                } else {
                    throw new Error();
                }
            } catch {
                err.innerText = "کێشەیەک د لینکێ دا هەیە یان ئەکاونت یێ تایبەتە!";
                err.classList.remove('hidden');
            } finally {
                btn.innerText = "دابەزینە";
            }
        }
    </script>
</body>
</html>
